# Use Nixpacks builder to support both PHP and Node.js
[build]
builder = "NIXPACKS"

[deploy]
startCommand = "mkdir -p storage/whatsapp-session database && [ -f database/database.sqlite ] || touch database/database.sqlite && php artisan migrate --force && (node whatsapp-bridge.js &) && (php artisan schedule:work &) && php artisan serve --host=0.0.0.0 --port=$PORT"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
