[deploy]
startCommand = "mkdir -p storage/whatsapp-session && touch database/database.sqlite && php artisan migrate --force && npx concurrently \"php artisan serve --host=0.0.0.0 --port=$PORT\" \"node whatsapp-bridge.js\" \"php artisan schedule:work\""
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
